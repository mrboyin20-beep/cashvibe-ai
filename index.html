<!DOCTYPE html>
<html>
<head>
<title>CashVibe AI Call</title>

<style>
body{
margin:0;
background:#0f172a;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.call-ui{
width:300px;
background:#111827;
border-radius:20px;
padding:30px;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,0.7);
}

.avatar{
width:80px;
height:80px;
border-radius:50%;
background:#22c55e;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
}

.status{
margin-top:15px;
font-size:16px;
color:#9ca3af;
}

button{
margin-top:20px;
padding:12px 20px;
border:none;
border-radius:12px;
background:#22c55e;
color:white;
cursor:pointer;
}

.end{
background:red;
}

</style>
</head>

<body>

<div class="call-ui">

<div class="avatar">🤖</div>

<h2>CashVibe Support</h2>

<div class="status" id="status">Ready to Call</div>

<button onclick="startCall()">📞 Start Call</button>
<button class="end" onclick="endCall()">❌ End</button>

</div>

<script>

let recognition;
let isCalling=false;

function startCall(){

isCalling=true;

document.getElementById("status").innerText="Calling...";

setTimeout(()=>{
speak("Hello! Welcome to CashVibe support. Main aapki help ke liye yahan hoon.");
listen();
},1500);

}

function listen(){

if(!isCalling) return;

recognition=new(window.SpeechRecognition || window.webkitSpeechRecognition)();

recognition.lang="en-IN";

recognition.start();

document.getElementById("status").innerText="Listening...";

recognition.onresult=function(e){

let text=e.results[0][0].transcript.toLowerCase();

document.getElementById("status").innerText="You: "+text;

let reply=ai(text);

setTimeout(()=>{
speak(reply);
},500);

if(text.includes("owner") || text.includes("human")){
connectOwner();
}else{
setTimeout(()=>listen(),1000);
}

}

}

function ai(t){

if(t.includes("cashvibe"))
return "CashVibe ek online earning platform hai jahan aap tasks, spin aur referral se earning kar sakte hain.";

if(t.includes("earn"))
return "Aap daily tasks, ads dekh kar aur spin se coins kama sakte hain.";

if(t.includes("withdraw"))
return "Minimum coins hone par aap withdrawal kar sakte hain.";

if(t.includes("signup"))
return "Signup karne ke liye cashvibe dot in website open kare.";

return "Aap CashVibe ke baare me kuch bhi puch sakte hain.";
}

function speak(text){

let speech=new SpeechSynthesisUtterance(text);

speech.lang="en-US";

let voices=speechSynthesis.getVoices();

// girl voice select
speech.voice = voices.find(v=>v.name.toLowerCase().includes("female")) || voices[1];

document.getElementById("status").innerText="AI: "+text;

speechSynthesis.speak(speech);

}

function connectOwner(){

speak("Main aapko owner se connect kar rahi hoon");

setTimeout(()=>{
window.location.href="tel:+919288678795";
},2000);

}

function endCall(){

isCalling=false;

if(recognition) recognition.stop();

document.getElementById("status").innerText="Call Ended";

}

</script>

</body>
</html>
