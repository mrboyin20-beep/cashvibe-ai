<!DOCTYPE html>
<html>
<head>
<title>CashVibe AI Call</title>

<style>
body{
margin:0;
background:#0f172a;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
width:320px;
background:#111827;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,0.7);
}

.avatar{
width:80px;
height:80px;
border-radius:50%;
background:#22c55e;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
}

.status{
margin-top:15px;
color:#9ca3af;
}

button{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:12px;
cursor:pointer;
background:#22c55e;
color:white;
}

.end{
background:red;
}
</style>

</head>

<body>

<div class="box">

<div class="avatar">🤖</div>

<h2>CashVibe Support</h2>

<p id="status">Ready to Call</p>

<button onclick="startCall()">📞 Start Call</button>
<button class="end" onclick="endCall()">❌ End</button>

</div>

<script>

let recognition;
let calling=false;
let step=0;

function startCall(){

calling=true;
step=0;

document.getElementById("status").innerText="Calling...";

setTimeout(()=>{
askQuestion();
},1500);

}

function askQuestion(){

if(!calling) return;

let questions=[
"Kya aap CashVibe ke baare me jaana chahte hain?",
"Kya aap earning process samajhna chahte hain?",
"Kya aap withdrawal ke baare me jaana chahte hain?",
"Kya aap owner se baat karna chahte hain?"
];

let q = questions[step];

speak(q);

setTimeout(()=>{
startListening();
},3000);

}

function startListening(){

if(!calling) return;

recognition=new(window.SpeechRecognition || window.webkitSpeechRecognition)();

recognition.lang="en-IN";

recognition.start();

document.getElementById("status").innerText="Listening...";

recognition.onresult=function(e){

let text=e.results[0][0].transcript.toLowerCase();

document.getElementById("status").innerText="You: "+text;

// YES
if(text.includes("haan") || text.includes("yes")){

handleYes();

}
// NO
else if(text.includes("na") || text.includes("no")){

handleNo();

}else{

speak("Kripya sirf haan ya na me jawab dein");

setTimeout(startListening,2000);

}

};

recognition.onerror=function(){
document.getElementById("status").innerText="Mic issue... retrying";
setTimeout(startListening,2000);
};

}

function handleYes(){

if(step===0){
speak("CashVibe ek earning platform hai jahan aap tasks aur referral se paisa kama sakte hain.");
}

if(step===1){
speak("Aap daily tasks aur ads dekh kar earning kar sakte hain.");
}

if(step===2){
speak("Minimum balance hone par aap withdrawal kar sakte hain.");
}

if(step===3){
connectOwner();
return;
}

step++;

setTimeout(()=>{
askQuestion();
},4000);

}

function handleNo(){

step++;

if(step<4){
askQuestion();
}else{
speak("Dhanyavaad, aapka din shubh ho");
endCall();
}

}

function speak(text){

let msg=new SpeechSynthesisUtterance(text);

msg.lang="en-US";

let voices=speechSynthesis.getVoices();
if(voices.length>0){
msg.voice=voices[1];
}

document.getElementById("status").innerText="AI: "+text;

speechSynthesis.speak(msg);

}

function connectOwner(){

speak("Main aapko owner se connect kar rahi hoon");

setTimeout(()=>{
window.location.href="tel:+919288678795";
},3000);

}

function endCall(){

calling=false;

if(recognition) recognition.stop();

document.getElementById("status").innerText="Call Ended";

}

</script>

</body>
</html>
